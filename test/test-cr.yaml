apiVersion: dynastub.example.com/v1
kind: BehaviorStub
metadata:
  name: test-behavior-stub
  namespace: default
spec:
  targetSelector:
    matchLabels:
      app: test-app
  sidecarImage: dynastub-sidecar:latest
  scriptVolume:
    hostPath: /opt/dynastub/scripts
    mountPath: /src/scripts
  behaviors:
    - name: test-behavior
      targetPath: /app/target
      scriptPath: /src/scripts/test.sh
      enableLogging: true
      logPath: /var/log/dynastub/test.log
---
apiVersion: v1
kind: Pod
metadata:
  name: test-app-pod
  namespace: default
  labels:
    app: test-app
spec:
  containers:
    - name: main
      image: busybox:latest
      command: ["sh", "-c", "while true; do echo 'Running...'; sleep 10; done"]
