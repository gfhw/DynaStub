apiVersion: dynastub.example.com/v1
kind: BehaviorStub
metadata:
  name: ls-behavior
  namespace: default
spec:
  targetSelector:
    matchLabels:
      app: test-app
  sidecarImage: dynastub-sidecar:latest
  scriptVolume:
    hostPath: /opt/dynastub/scripts
    mountPath: /src/scripts
  behaviors:
  - name: replace-ls
    targetPath: /bin/ls
    scriptPath: ls
    enableLogging: true
    logPath: /var/log/dynastub/ls.log
  - name: replace-cat
    targetPath: /bin/cat
    scriptPath: cat
    enableLogging: true
    logPath: /var/log/dynastub/cat.log
  sidecarResources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 32Mi
