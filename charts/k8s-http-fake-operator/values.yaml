# Sidecar configuration
sidecar:
  image:
    repository: dynastub-sidecar
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Operator configuration
operator:
  metrics:
    enabled: false
    bindAddress: "0"
    secure: true
    certPath: ""
    certName: "tls.crt"
    keyName: "tls.key"
  
  healthProbe:
    bindAddress: ":8081"
  
  leaderElection:
    enabled: false
