# Default values for k8s-http-fake-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: dynastub-operator
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# API Group configuration
apiGroup:
  fullName: "dynastub.example.com"
  # suffix: "example"  # 可选，如果设置了 suffix，则 API group 为 httpteststub.{suffix}.com

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Webhook configuration
webhook:
  enabled: true
  autoGenerate: false
  certSecretName: "dynastub-webhook-tls"
  certPath: "/tmp/k8s-webhook-server/serving-certs"
  # Service configuration for webhook
  service:
    port: 443
    targetPort: 9443
  # CA bundle for webhook (base64 encoded) - 使用新生成的 CA 证书
  caBundle: ""
  # TLS certificate and key (原始 PEM 格式，模板会自动进行 base64 编码)
