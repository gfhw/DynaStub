replicaCount: 1

# API Group configuration for CRD isolation
# Allows multiple deployments with different API groups
apiGroup:
  # The API group suffix (e.g., "example" becomes "dynastub.example.com")
  # If empty, defaults to "example"
  suffix: ""
  # Full API group name (overrides suffix if set)
  # If empty, uses "dynastub.{{ suffix }}.com" or "dynastub.example.com" if suffix is empty
  fullName: ""

image:
  repository: dynastub-operator
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  clusterIP: ""  # Optional: Specify a custom cluster IP address (IPv4 or IPv6)
  port: 9443  # Webhook port
  healthPort: 8081

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Webhook configuration
webhook:
  enabled: true
  # If autoGenerate is true, Helm will generate a self-signed certificate
  # If false, you must provide your own certificate in the specified secret
  autoGenerate: true
  # Name of the Kubernetes Secret containing the webhook TLS certificate
  # The secret should have tls.crt and tls.key data fields
  certSecretName: "dynastub-webhook-tls"
  # Path to certificate files inside the container
  certPath: "/tmp/k8s-webhook-server/serving-certs"
  # Service configuration for webhook
  service:
    port: 443
    targetPort: 9443

# Sidecar configuration
sidecar:
  image:
    repository: dynastub-sidecar
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Operator configuration
operator:
  metrics:
    enabled: false
    bindAddress: "0"
    secure: true
    certPath: ""
    certName: "tls.crt"
    keyName: "tls.key"
  
  healthProbe:
    bindAddress: ":8081"
  
  leaderElection:
    enabled: false
