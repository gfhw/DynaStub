{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "k8s-http-fake-operator.fullname" . }}-webhook
  labels:
    {{- include "k8s-http-fake-operator.labels" . | nindent 4 }}
webhooks:
  - name: mpod.kb.io
    clientConfig:
      service:
        name: {{ include "k8s-http-fake-operator.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-v1-pod
        port: {{ .Values.webhook.service.port }}
      caBundle: {{ if .Values.webhook.autoGenerate }}Cg=={{ else }}{{ required "CA bundle is required when autoGenerate is false" .Values.webhook.caBundle | b64enc }}{{ end }}
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: Namespaced
    namespaceSelector:
      matchLabels:
        dynastub-injection: enabled
    failurePolicy: Fail
    sideEffects: None
    admissionReviewVersions: ["v1"]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-http-fake-operator.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-http-fake-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.webhook.service.port }}
      targetPort: {{ .Values.webhook.service.targetPort }}
      protocol: TCP
      name: webhook
  selector:
    {{- include "k8s-http-fake-operator.selectorLabels" . | nindent 4 }}
{{- if .Values.webhook.autoGenerate }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.webhook.certSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-http-fake-operator.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ required "TLS certificate is required" .Values.webhook.tls.crt | b64enc }}
  tls.key: {{ required "TLS key is required" .Values.webhook.tls.key | b64enc }}
{{- end }}
{{- end }}
