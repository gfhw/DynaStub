{{- if .Values.webhook.enabled }}
# Webhook Service - must be created before the MutatingWebhookConfiguration
apiVersion: v1
kind: Service
metadata:
  name: k8s-http-fake-operator-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-http-fake-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.webhook.service.port }}
      targetPort: {{ .Values.webhook.service.targetPort }}
      protocol: TCP
      name: webhook
  selector:
    {{- include "k8s-http-fake-operator.selectorLabels" . | nindent 4 }}
---
# Webhook TLS Secret - must be created before the operator pod starts
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.webhook.certSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-http-fake-operator.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.webhook.tls.crt }}
  tls.key: {{ .Values.webhook.tls.key }}
{{- end }}
