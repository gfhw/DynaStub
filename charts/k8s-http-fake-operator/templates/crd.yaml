apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: behaviorstubs.dynastub.example.com
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: dynastub.example.com
  names:
    kind: BehaviorStub
    listKind: BehaviorStubList
    plural: behaviorstubs
    singular: behaviorstub
    shortNames:
      - bs
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: BehaviorStub 是 DynaStub 的核心资源，定义行为注入规则
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: BehaviorStubSpec 定义行为注入规则
              type: object
              required:
                - targetSelector
                - sidecarImage
                - scriptVolume
                - behaviors
              properties:
                targetSelector:
                  description: 目标 Pod 选择器
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchExpressions:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                          values:
                            type: array
                            items:
                              type: string
                sidecarImage:
                  description: Sidecar 容器镜像
                  type: string
                sidecarResources:
                  description: Sidecar 资源限制
                  type: object
                  properties:
                    limits:
                      type: object
                      additionalProperties:
                        type: string
                    requests:
                      type: object
                      additionalProperties:
                        type: string
                scriptVolume:
                  description: 脚本卷配置
                  type: object
                  required:
                    - hostPath
                    - mountPath
                  properties:
                    hostPath:
                      description: 宿主机脚本目录路径
                      type: string
                    mountPath:
                      description: 容器内挂载路径
                      type: string
                behaviors:
                  description: 行为注入列表
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - targetPath
                      - scriptPath
                    properties:
                      name:
                        description: 行为名称
                        type: string
                      targetPath:
                        description: 目标可执行文件路径
                        type: string
                      scriptPath:
                        description: 用户脚本路径
                        type: string
                      enableLogging:
                        description: 是否启用日志
                        type: boolean
                        default: false
                      logPath:
                        description: 日志路径
                        type: string
                advanced:
                  description: 高级配置
                  type: object
                  properties:
                    injectionMode:
                      description: 注入模式
                      type: string
                      enum:
                        - init-container
                        - sidecar
                      default: init-container
                    restartPolicy:
                      description: 重启策略
                      type: string
                      enum:
                        - Always
                        - OnFailure
                        - Never
                      default: Always
            status:
              description: BehaviorStubStatus 定义资源状态
              type: object
              properties:
                phase:
                  description: 当前阶段
                  type: string
                injectedPods:
                  description: 已注入 Pod 数量
                  type: integer
                totalPods:
                  description: 目标 Pod 总数
                  type: integer
                lastUpdateTime:
                  description: 最后更新时间
                  type: string
                  format: date-time
                conditions:
                  description: 状态条件
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
