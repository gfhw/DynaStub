{{- $apiGroup := include "k8s-http-fake-operator.apiGroup" . -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-http-fake-operator.fullname" . }}-manager-role
  labels:
    {{- include "k8s-http-fake-operator.labels" . | nindent 4 }}
rules:
# BehaviorStub CRD 权限
- apiGroups:
  - dynastub.example.com
  resources:
  - behaviorstubs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dynastub.example.com
  resources:
  - behaviorstubs/finalizers
  verbs:
  - update
- apiGroups:
  - dynastub.example.com
  resources:
  - behaviorstubs/status
  verbs:
  - get
  - patch
  - update
# Pod 权限（用于 Webhook 注入）
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
# 事件权限
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
# Secret 权限（用于 Webhook TLS）
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
# MutatingWebhookConfiguration 权限（用于动态管理 webhook）
- apiGroups:
  - admissionregistration.k8s.io
  resources:
  - mutatingwebhookconfigurations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-http-fake-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "k8s-http-fake-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-http-fake-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "k8s-http-fake-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
