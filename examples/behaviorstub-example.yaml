apiVersion: dynastub.example.com/v1
kind: BehaviorStub
metadata:
  name: go-app-behavior
  namespace: default
spec:
  mode: local
  localConfig:
    targetSelector:
      matchLabels:
        app: go-app
    sidecarImage: dynastub-sidecar:latest
    sidecarResources:
      limits:
        cpu: "200m"
        memory: "128Mi"
      requests:
        cpu: "50m"
        memory: "32Mi"
  scriptVolume:
    hostPath: /opt/dynastub/scripts
    mountPath: /src/scripts
  behaviors:
    - name: replace-go-binary
      targetPath: /app/myapp
      scriptPath: /src/scripts/myapp-stub.sh
      backupOriginal: true
      enableLogging: true
      logPath: /var/log/dynastub/myapp.log
  advanced:
    injectionMode: init-container
    restartPolicy: Always
